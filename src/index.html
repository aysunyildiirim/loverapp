<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Benim Paylaşım Sitem</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; background: #f4f4f4; }
        .form-group { margin-bottom: 15px; }
        input, textarea { width: 100%; padding: 8px; margin-top: 5px; }
        button { background: #28a745; color: white; border: none; padding: 10px; cursor: pointer; width: 100%; }
        button:hover { background: #218838; }
    </style>
</head>
<body>
    <h2>Yeni Paylaşım Yap</h2>
    <form id="paylasimFormu">
        <div class="form-group">
            <label>Başlık:</label>
            <input type="text" id="baslik" required>
        </div>
        <div class="form-group">
            <label>Açıklama:</label>
            <textarea id="aciklama" rows="4"></textarea>
        </div>
        <div class="form-group">
            <label>Görsel Seç:</label>
            <input type="file" id="resim" accept="image/*" required>
        </div>
        <button type="submit">Gönder</button>
    </form>

    <script>
        document.getElementById('paylasimFormu').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('baslik', document.getElementById('baslik').value);
            formData.append('aciklama', document.getElementById('aciklama').value);
            formData.append('resim', document.getElementById('resim').files[0]);

            const response = await fetch('http://localhost:3000/paylas', {
                method: 'POST',
                body: formData
            });

            const sonuc = await response.json();
            alert(sonuc.mesaj);
            if(response.ok) location.reload();
        });
    </script>
</body>
</html>
